appId: fractal-analytics-platform.github.io
productName: Fractal Lite
artifactName: FractalLite-${version}-${os}-${arch}.${ext}
copyright: Copyright © 2026 BioVisionCenter

directories:
  buildResources: build-resources
  output: dist-electron

afterPack: scripts/after-pack.js

files:
  - out/**/*
  - package.json

# PyInstaller onedir output (backend + bundled static frontend) is populated
# by scripts/build-components.sh before packaging.
extraResources:
  - from: resources/fractal-app-lite
    to: fractal-app-lite
  - from: build-resources/fractal_logo.png
    to: fractal_logo.png

mac:
  category: public.app-category.developer-tools
  # PyInstaller binaries require an entitlement for running unsigned code on macOS 14+
  # hardenedRuntime: true
  # entitlements: build-resources/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - x64
        - arm64

linux:
  target:
    - target: AppImage
      arch:
        - x64

win:
  target:
    - target: nsis
      arch:
        - x64
