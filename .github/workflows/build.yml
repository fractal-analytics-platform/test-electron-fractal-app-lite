name: Build and Release

# Runs on every tag push (v*) → uploads to a GitHub Release.
# Can also be triggered manually from the Actions tab → uploads as workflow artifacts (7 days).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x64
            eb_flags: --linux --x64

          - os: macos-26
            platform: macos-arm64
            eb_flags: --mac --arm64
            
          - os: macos-15-intel
            platform: macos-x64
            eb_flags: --mac --x64

          - os: windows-2025
            platform: windows-x64
            eb_flags: --win --x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set version from tag
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      # Python is needed by the vite.config.js patch (python3 heredoc in the build script).
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install npm dependencies
        run: npm install

      # Builds the SvelteKit frontend (npm ci + npm run build inside the submodule)
      # and then the PyInstaller onedir binary, placing both under resources/.
      # shell: bash ensures Git Bash is used on Windows.
      - name: Build frontend and Python binary
        shell: bash
        run: bash scripts/build-components.sh

      - name: Compile TypeScript (electron-vite)
        run: npm run build

      # Pass explicit --platform --arch flags so electron-builder ignores the arch
      # arrays in electron-builder.yml and only builds what this runner can produce.
      # PyInstaller binaries are platform-specific, so cross-compiling is not possible.
      - name: Package with electron-builder
        run: npx electron-builder ${{ matrix.eb_flags }}
        env:
          # Authenticates electron-builder's GitHub downloads (Electron binary, etc.)
          # and allows publishing to Releases without hitting anonymous rate limits.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report bundle sizes
        shell: bash
        run: |
          echo "=== Distributable ==="
          ls -lh dist-electron/*.AppImage dist-electron/*.dmg dist-electron/*.exe 2>/dev/null || true

          echo ""
          echo "=== PyInstaller bundle ==="
          BUNDLE=$(find dist-electron -maxdepth 6 -type d -name 'fractal-app-lite' | head -1)
          echo "Path: $BUNDLE"
          du -sh "$BUNDLE"

          echo "  executable:"
          find "$BUNDLE" -maxdepth 1 -name 'fractal-app-lite*' ! -type d -exec du -sh {} \;

          echo "  _internal/:"
          du -sh "$BUNDLE/_internal"

          echo "  _internal/frontend/ (SvelteKit):"
          du -sh "$BUNDLE/_internal/frontend"

          echo ""
          echo "=== Top 15 packages in _internal (by size) ==="
          du -sh "$BUNDLE/_internal/"*/ 2>/dev/null | sort -rh | head -15

      - name: Install Xvfb (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y xvfb

      - name: Measure startup time
        shell: bash
        run: |
          # Find the Electron wrapper produced by electron-builder for this platform.
          # Linux:   linux-unpacked/<executableName>  (shell wrapper that adds --no-sandbox)
          # macOS:   mac*/Fractal Lite.app/Contents/MacOS/Fractal Lite
          # Windows: win-unpacked/Fractal Lite.exe
          case "$(uname -s)" in
            Linux)
              ELECTRON=$(find dist-electron/linux-unpacked -maxdepth 1 -type f ! -name '*.bin' | head -1)
              RUNNER="xvfb-run --auto-servernum"
              ;;
            Darwin)
              ELECTRON=$(find dist-electron -maxdepth 5 -path '*/MacOS/Fractal Lite' | head -1)
              RUNNER=""
              ;;
            *)
              ELECTRON=$(find dist-electron/win-unpacked -maxdepth 1 -name '*.exe' | head -1)
              RUNNER=""
              ;;
          esac
          echo "Electron binary: $ELECTRON"

          LOG=$(mktemp)
          $RUNNER "$ELECTRON" >"$LOG" 2>&1 &
          PID=$!

          WAITED=0
          while [ $WAITED -lt 90 ]; do
            grep -q '\[TIMING\] page loaded' "$LOG" 2>/dev/null && break
            sleep 1
            WAITED=$((WAITED + 1))
          done

          echo "=== Startup timing ==="
          grep '\[TIMING\]' "$LOG" || echo "No timing data captured (timeout or crash)"
          echo "=== Electron log ==="
          cat "$LOG"

          kill $PID 2>/dev/null || true
          rm -f "$LOG"

      # On tag pushes: upload the distributable to a GitHub Release.
      # All four jobs upload to the same release; the first one creates it.
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag'
        with:
          generate_release_notes: true
          # Upload everything in dist-electron/ (installer + auto-update manifest).
          # Glob matches AppImage / dmg / exe / *.yml depending on the platform.
          files: dist-electron/*
          fail_on_unmatched_files: false

      # On manual runs (workflow_dispatch): expose the build as a downloadable artifact.
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        if: github.ref_type != 'tag'
        with:
          name: dist-${{ matrix.platform }}
          path: dist-electron/
          retention-days: 7
